name: swiftbolt
description: A modern, offline file-sharing system for 1-to-N transfers and group live-streaming.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7

  # Networking
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  shelf_web_socket: ^1.0.4
  http: ^1.2.1

  # Database
  sqflite: ^2.3.3
  path_provider: ^2.1.4
  path: ^1.9.0

  # Cryptography
  pointycastle: ^3.9.1
  crypto: ^3.0.5
  archive: ^3.6.1

  # Biometric Auth
  local_auth: ^2.3.0

  # Sensors
  sensors_plus: ^6.1.1

  # Localization
  intl: ^0.20.2

  # UI
  fl_chart: ^0.69.2
  video_player: ^2.9.2
  google_fonts: ^6.2.1
  qr_flutter: ^4.1.0
  audioplayers: ^6.1.0

  # Permissions
  permission_handler: ^11.3.1

  # Utils
  uuid: ^4.5.1
  mime: ^2.0.0
  share_plus: ^10.1.4
  get_it: ^8.0.2
  rxdart: ^0.28.0
  ffmpeg_kit_flutter: ^6.0.3
  file_picker: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true

  # تم تعطيل الصور والخطوط مؤقتاً عشان البناء ينجح
