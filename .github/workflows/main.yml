name: SwiftBolt Final Build
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' 

      - name: Smart Fix for Android V1
        run: |
          python3 -c '
          import os, glob, re
          path = "android/app/src/main/AndroidManifest.xml"
          if os.path.exists(path):
              with open(path, "r") as f:
                  content = f.read()
              if "flutterEmbedding" not in content:
                  content = content.replace("<activity", "<meta-data android:name=\"flutterEmbedding\" android:value=\"2\" />\n        <activity", 1)
                  with open(path, "w") as f:
                      f.write(content)
          for ext in ["*.java", "*.kt"]:
              for file_path in glob.glob("android/app/src/main/**/" + ext, recursive=True):
                  with open(file_path, "r") as f:
                      content = f.read()
                  content = content.replace("io.flutter.app.FlutterActivity", "io.flutter.embedding.android.FlutterActivity")
                  content = re.sub(r"GeneratedPluginRegistrant\.registerWith\(.*?\);?", "", content)
                  with open(file_path, "w") as f:
                      f.write(content)
          '

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: swiftbolt-apk
          path: build/app/outputs/flutter-apk/app-release.apk
