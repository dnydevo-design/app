name: SwiftBolt Final Build
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # الزرار اليدوي اللي بنشغل منه المصنع

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4 # التعديل اللي هيخلي الرفع ينجح
        with:
          name: swiftbolt-apk
          path: build/app/outputs/flutter-apk/app-release.apk
